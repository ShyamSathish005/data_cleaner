name: data_cleaning_pipeline
version: 0.1.0
description: "OpenEnv: Data Cleaning Pipeline environment with easy/medium/hard tasks"
author: Shyam Sathish
tags:
  - openenv
  - data-cleaning
  - etl
api:
  type: openenv
  version: 1
tasks:
  - id: fix_types
    name: Easy - fix_types
    description: Cast numeric-like strings to numeric types.
    rows: 120
  - id: normalize_dedupe
    name: Medium - normalize_dedupe
    description: Normalize dates and remove fuzzy duplicates.
    rows: 100
  - id: full_pipeline
    name: Hard - full_pipeline
    description: Missing values, outliers, logic violations.
    rows: 200
schema:
  interface:
    - reset(task_id) -> task metadata
    - step(action) -> Observation, Reward, done, info
    - state() -> Observation
  action_space:
    type: dict
    keys:
      name: string
      params: dict
    allowed_actions:
      - fill_missing
      - cast_type
      - drop_duplicates
      - replace
      - normalize_dates
      - clamp_outliers
      - submit
  observation_space:
    dataframe_preview: list[dict]
    markdown_preview: string
    null_counts: dict[str,int]
    validation_errors: list[string]
    accuracy: float
    step_count: int
    steps_remaining: int
  reward:
    dense: true
    description: Reward is dense progress clipped to [0.0, 1.0] with invalid operation penalty and submit handling
